name: Release Pipeline

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Track & Version Packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4
        with:
          # Fetch-depth 0 is critical for Changesets to accurately calculate git history diffs
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install Monorepo Dependencies
        run: pnpm install --frozen-lockfile

      - name: Execute Changesets Automation
        id: changesets
        uses: changesets/action@v1
        with:
          # Since you are developing private apps and not deploying to the public npm registry,
          # we instruct the action to generate and push your Git tags upon PR merge.
          publish: pnpm changeset tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}